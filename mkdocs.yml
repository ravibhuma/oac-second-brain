site_name: OAC Second Brain
site_description: Comprehensive AI-maintained knowledge base for Oracle Analytics Cloud
site_url: https://ravibhuma.github.io/oac-second-brain/
repo_url: https://github.com/ravibhuma/oac-second-brain
repo_name: ravibhuma/oac-second-brain
edit_uri: edit/main/

# Don't fail on warnings (e.g., files not in nav)
validation:
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: ignore
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: ignore

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
    - toc.follow
    - announce.dismiss
    - header.autohide
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Default: Light mode (matches docs.oracle.com aesthetic)
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode (when user toggles)
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    annotation: material/plus-circle
  favicon: assets/favicon.svg

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - All Topics: topics.md
  - Coverage Matrix: wiki/Docs Coverage Matrix.md
  - "Use With AI":
    - All AI Tools: AI_ASSISTANTS.md
    - Claude Code Setup: CLAUDE_CODE_SETUP.md
    - OpenAI Codex Setup: CODEX_SETUP.md
  - Platform & Architecture:
    - wiki/OAC Overview & Architecture.md
    - wiki/OAC vs OBIEE vs OAS Comparison.md
    - wiki/Subscribe & Provisioning.md
    - wiki/Whats New & Release Updates.md
  - Data Layer:
    - wiki/Data Sources & Connections.md
    - wiki/Semantic Model.md
    - wiki/Subject Areas & Datasets.md
  - Analytics & Reporting:
    - wiki/Workbooks & Visualizations.md
    - wiki/Maps & Geospatial Analytics.md
    - wiki/Classic Dashboards & Analyses.md
    - wiki/BI Publisher.md
  - Data Engineering:
    - wiki/Data Flows & Data Preparation.md
    - wiki/Machine Learning & AI Features.md
  - AI Ecosystem:
    - wiki/OAC AI Ecosystem.md
    - wiki/OAC AI Agents.md
    - wiki/OAC MCP Server.md
  - Governance & Security:
    - wiki/Security & Row-Level Security.md
    - wiki/Administration & Service Console.md
  - Developer Reference:
    - wiki/Logical SQL Reference.md
    - wiki/APIs, Embedding & Integration.md
    - wiki/OCI REST APIs & CLI for OAC.md
    - wiki/Custom Visualizations & Plug-ins.md
  - End User:
    - wiki/Consumer Guide (Explore).md
    - wiki/Mobile (Oracle Analytics App).md
  - Operations:
    - wiki/KPIs, Alerts & Notifications.md
    - wiki/Migration, Snapshots & Lifecycle.md
    - wiki/FAQs & Troubleshooting.md
  - Reference:
    - wiki/Tutorials, Solutions & Learning Resources.md
    - wiki/Source PDFs Index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ravibhuma
    - icon: fontawesome/brands/medium
      link: https://medium.com/@ravishankerb
  generator: false

extra_css:
  - stylesheets/extra.css

