<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <defs>
    <linearGradient id="dot" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F5A3D"/>
      <stop offset="1" stop-color="#00A36C"/>
    </linearGradient>
  </defs>
  <!-- Brand mark: graph-network icon -->
  <g transform="translate(4 8)">
    <circle cx="24" cy="24" r="22" stroke="url(#dot)" stroke-width="2.5" fill="none"/>
    <circle cx="14" cy="16" r="2.5" fill="url(#dot)"/>
    <circle cx="34" cy="16" r="2.5" fill="url(#dot)"/>
    <circle cx="24" cy="28" r="2.5" fill="url(#dot)"/>
    <circle cx="14" cy="36" r="2.5" fill="url(#dot)"/>
    <circle cx="34" cy="36" r="2.5" fill="url(#dot)"/>
    <line x1="14" y1="16" x2="24" y2="28" stroke="url(#dot)" stroke-width="1.2" opacity="0.7"/>
    <line x1="34" y1="16" x2="24" y2="28" stroke="url(#dot)" stroke-width="1.2" opacity="0.7"/>
    <line x1="24" y1="28" x2="14" y2="36" stroke="url(#dot)" stroke-width="1.2" opacity="0.7"/>
    <line x1="24" y1="28" x2="34" y2="36" stroke="url(#dot)" stroke-width="1.2" opacity="0.7"/>
  </g>
  <!-- Wordmark: "OAC" in Oracle red, "Second Brain" in slate -->
  <text x="64" y="28" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.02em" fill="#C74634">OAC</text>
  <text x="64" y="50" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="0" fill="#5A6772">Second Brain</text>
</svg>
