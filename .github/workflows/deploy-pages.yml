name: Deploy MkDocs site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs and plugins
        run: |
          pip install mkdocs-material

      - name: Stage content into docs/ folder
        run: |
          mkdir -p docs/wiki docs/stylesheets
          cp -r wiki/*.md docs/wiki/
          cp -r stylesheets/*.css docs/stylesheets/
          # README becomes the homepage (landing page)
          cp README.md docs/index.md
          # Original index.md becomes the topic index
          cp index.md docs/topics.md
          # Setup guides accessible from site
          cp CLAUDE_CODE_SETUP.md docs/claude-code-setup.md
          cp CODEX_SETUP.md docs/codex-setup.md
          cp AI_ASSISTANTS.md docs/ai-assistants.md

      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
