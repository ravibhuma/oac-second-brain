name: Deploy MkDocs site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs and plugins
        run: |
          pip install mkdocs-material

      - name: Stage content into docs/ folder
        run: |
          mkdir -p docs/wiki docs/stylesheets docs/assets
          cp -r wiki/*.md docs/wiki/
          cp -r stylesheets/*.css docs/stylesheets/
          cp -r assets/* docs/assets/
          # README becomes the homepage (landing page)
          cp README.md docs/index.md
          # Original index.md becomes the topic index (renamed to avoid clash with homepage)
          cp index.md docs/topics.md
          # Setup guides — keep original filenames so README links work locally + on site
          cp CLAUDE_CODE_SETUP.md docs/CLAUDE_CODE_SETUP.md
          cp CODEX_SETUP.md docs/CODEX_SETUP.md
          cp AI_ASSISTANTS.md docs/AI_ASSISTANTS.md
          cp SETUP.md docs/SETUP.md
          cp PROJECT_INSTRUCTIONS.md docs/PROJECT_INSTRUCTIONS.md
          cp LICENSE docs/LICENSE.md

      - name: Preprocess [[wiki links]] into real markdown links
        run: python scripts/preprocess_wikilinks.py docs

      - name: Build interactive knowledge graph
        run: python scripts/build_graph.py docs

      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
